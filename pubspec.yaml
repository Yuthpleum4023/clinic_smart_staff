name: clinic_smart_staff
description: "A Flutter project for clinic smart staff management."
publish_to: 'none'

version: 1.0.2+3

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # -------------------------------
  # Network / API
  # -------------------------------
  http: ^1.2.2

  # -------------------------------
  # Storage
  # -------------------------------
  shared_preferences: ^2.2.2

  # -------------------------------
  # ✅ Location (GPS)
  # -------------------------------
  geolocator: ^10.1.0

  # -------------------------------
  # ✅ Map
  # -------------------------------
  flutter_map: ^6.1.0
  latlong2: ^0.9.1

  # -------------------------------
  # ✅ เปิด Google Maps / โทรศัพท์
  # -------------------------------
  url_launcher: ^6.3.0

  # -------------------------------
  # ✅ Share (Invite / LINE / etc)
  # -------------------------------
  share_plus: ^10.0.2

  # -------------------------------
  # ✅ Fingerprint / FaceID (Biometric)
  # -------------------------------
  local_auth: ^2.2.0
  local_auth_android: ^1.0.46
  local_auth_ios: ^1.1.7

  # -------------------------------
  # PDF & Printing
  # -------------------------------
  pdf: ^3.10.7
  printing: ^5.11.1
  path_provider: ^2.1.1

  # -------------------------------
  # ✅ Image Picker (เลือกโลโก้จากเครื่อง)
  # -------------------------------
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png
    - assets/icons/app_icon_1024.png
    - assets/fonts/

  # ✅ Thai font for app widgets (Text) + can be used by name: "NotoSansThai"
  fonts:
    - family: NotoSansThai
      fonts:
        - asset: assets/fonts/NotoSansThai_Condensed-Regular.ttf
          weight: 400
        - asset: assets/fonts/NotoSansThai_Condensed-Bold.ttf
          weight: 700

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/app_icon_1024.png
  remove_alpha_ios: true